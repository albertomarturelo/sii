name: Publish packages

# CD for the public npm packages — @albertomarturelo/sii-core, -cli, -mcp — triggered
# by a `v*` git tag (ADR-015 flow, registry per ADR-019, surfaces added per ADR-021).
# The three versions move in LOCKSTEP: bump all of packages/{core,cli,mcp}/package.json
# to the same version, merge, then push a matching tag (`v0.5.0` ⇒ version 0.5.0).
# `pnpm -r publish` is idempotent — already-published versions are skipped. Needs an
# `NPM_TOKEN` repo secret (npm automation token, publish rights on `@albertomarturelo`).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build + publish (core + cli + mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — action-setup reads pnpm from package.json
      # `packageManager` (the single source of truth), matching ci.yml.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@albertomarturelo'

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build (tsc -b)
        run: pnpm build

      - name: Verify tag matches all package versions (lockstep)
        # Guard against a mismatched tag publishing a stale version. All three
        # packages must equal the tag (ADR-021 — versions move in lockstep).
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          for pkg in core cli mcp; do
            version=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$version" != "$tag" ]; then
              echo "::error::Tag '${GITHUB_REF_NAME}' does not match packages/${pkg} version '${version}'. Bump all three package.json in lockstep or retag."
              exit 1
            fi
          done
          echo "Tag ${GITHUB_REF_NAME} matches core + cli + mcp."

      - name: Publish to public npm (idempotent — skips already-published versions)
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
