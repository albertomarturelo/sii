name: Publish core

# CD for @albertomarturelo/sii-core → the PUBLIC npm registry, triggered by a
# `v*` git tag (ADR-015 flow, registry changed by ADR-019). Bump
# packages/core/package.json `version`, merge, then push a tag whose name matches
# (`v0.3.0` ⇒ version 0.3.0). Needs an `NPM_TOKEN` repo secret — an npm
# automation token with publish rights on the `@albertomarturelo` scope.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build + publish @albertomarturelo/sii-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — action-setup reads pnpm from package.json
      # `packageManager` (the single source of truth), matching ci.yml.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@albertomarturelo'

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build (tsc -b)
        run: pnpm build

      - name: Verify tag matches package version
        # Guard against a mismatched tag publishing a stale version.
        run: |
          set -euo pipefail
          version=$(node -p "require('./packages/core/package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match @albertomarturelo/sii-core version '${version}'. Bump package.json or retag."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches version ${version}."

      - name: Publish to public npm
        run: pnpm --filter @albertomarturelo/sii-core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
